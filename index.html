<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relógio Analógico - Miniprojeto CG</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container {
            text-align: center;
        }

        h1 {
            color: white;
            margin-bottom: 5px;
            font-size: 32px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .subtitle {
            color: rgba(255,255,255,0.9);
            margin-bottom: 20px;
            font-size: 16px;
        }

        canvas {
            display: block;
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
            border: 5px solid white;
        }

        .info-panel {
            color: white;
            margin-top: 20px;
            font-size: 13px;
            background: rgba(0,0,0,0.2);
            padding: 15px 20px;
            border-radius: 10px;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }

        .info-panel strong {
            color: #FFE66D;
        }

        .etapa {
            background: rgba(255,255,255,0.1);
            padding: 8px 12px;
            border-radius: 5px;
            margin-top: 10px;
            color: #A29BFE;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🕐 Relógio Analógico</h1>
        <div class="subtitle">Aprendendo Transformações 2D - Canvas HTML5</div>
        
        <canvas id="clock" width="500" height="500"></canvas>
        
        <div class="info-panel">
            <strong>Requisitos Implementados:</strong>
            <br>✓ Translação • ✓ Rotação • ✓ Escala • ✓ Composição
            <br>✓ Ponto Fixo • ✓ Animação • ✓ Save/Restore
            <div class="etapa">
                <strong>Etapa 1:</strong> Estrutura básica do relógio
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
